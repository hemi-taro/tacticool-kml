<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MSN Aviation Keyboard Mockup Revision 8</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, sans-serif;
      --bg: #eef1f4;
      --ink: #17202a;
      --navy: #122333;
      --key: #626973;
      --key-dark: #35404a;
      --key-disabled: #29343e;
      --accent: #56b5e7;
      --keyboard-height: 0px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body.keyboard-open { padding-bottom: calc(var(--keyboard-height) + env(safe-area-inset-bottom)); }
    header { padding: 18px; background: var(--navy); color: white; }
    header h1 { margin: 0; font-size: 1.2rem; }
    header p { margin: 6px 0 0; color: #c9d4dd; font-size: .84rem; }
    main { max-width: 760px; margin: auto; padding: 16px; display: grid; gap: 14px; }
    section { padding: 15px; border: 1px solid #d5dce2; border-radius: 10px; background: white; }
    h2 { margin: 0 0 12px; font-size: 1rem; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: grid; gap: 5px; color: #40505f; font-size: .8rem; font-weight: 700; }
    .editor {
      position: relative;
      width: 100%;
      min-height: 50px;
      padding: 11px;
      overflow: hidden;
      border: 2px solid #adb9c4;
      border-radius: 8px;
      background: white;
      color: var(--ink);
      font: 1.05rem ui-monospace, SFMono-Regular, monospace;
      white-space: pre;
      cursor: text;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .editor.active { border-color: var(--accent); box-shadow: 0 0 0 3px #56b5e733; }
    .editor.empty::before { content: attr(data-placeholder); color: #89949e; }
    .caret {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      margin: 0 -1px;
      vertical-align: -.18em;
      background: #1687c5;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .note { margin: 12px 0 0; color: #65727e; font-size: .8rem; }
    .keyboard {
      position: fixed;
      z-index: 10;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 9px 9px calc(9px + env(safe-area-inset-bottom));
      overflow: hidden;
      background: linear-gradient(#142431, #101d27);
      box-shadow: 0 -2px 12px #0005;
      color: white;
      transform: translateY(110%);
      transition: transform .16s ease-out;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    body.keyboard-open .keyboard { transform: translateY(0); }
    .keys {
      position: relative;
      width: min(100%, 1024px);
      margin-inline: auto;
    }
    .key {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: var(--key);
      box-shadow: 0 2px 0 #080d11;
      color: white;
      font: 500 1.35rem system-ui, -apple-system, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }
    .key:active { transform: translateY(1px); box-shadow: 0 1px 0 #080d11; }
    .key.control { background: var(--key-dark); font-size: .88rem; font-weight: 700; }
    .key.disabled { background: var(--key-disabled); color: #ffffff45; }
    .key.paste-success { background: #168c7a; }
    .key.paste-failure { background: #b83b3b; }
    @media (min-width: 760px) {
      .keyboard { padding-inline: 18px; }
    }
    @media (max-width: 520px) {
      .fields { grid-template-columns: 1fr; }
      .keyboard { padding-inline: 6px; }
      .key { font-size: 1.12rem; }
      .key.control { padding: 2px; font-size: .72rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Aviation Keyboard Mockup Revision 8</h1>
    <p>本体には未実装。配置と操作の確認用です。</p>
  </header>
  <main id="page-content">
    <section>
      <h2>Coordinate input</h2>
      <div class="fields">
        <label>Bullseye coordinates
          <div class="editor" data-mode="coordinate" data-value="33.67788N/131.03668E" data-placeholder="Lat / Lon" role="textbox" tabindex="0"></div>
        </label>
        <label>SAM center coordinates
          <div class="editor empty" data-mode="coordinate" data-value="" data-placeholder="Lat / Lon" role="textbox" tabindex="0"></div>
        </label>
      </div>
      <p class="note">座標欄ではすべてのキーを使用できます。</p>
    </section>
    <section>
      <h2>Numeric input</h2>
      <div class="fields">
        <label>Heading
          <div class="editor" data-mode="numeric" data-value="045" data-placeholder="Heading" role="textbox" tabindex="0"></div>
        </label>
        <label>Distance (NM)
          <div class="editor" data-mode="numeric" data-value="12.5" data-placeholder="Distance" role="textbox" tabindex="0"></div>
        </label>
      </div>
      <p class="note">数値欄では座標記号を無効表示します。名前欄は通常のiOSキーボードを使う想定です。</p>
    </section>
    <section>
      <h2>Scroll test</h2>
      <p class="note">この領域までスクロールし、キーボードが画面下部に固定されるか確認してください。</p>
      <div style="height:320px"></div>
    </section>
  </main>

  <aside class="keyboard" aria-label="Aviation keyboard mockup">
    <div class="keys">
      <div class="key control" data-area="up" data-action="previous" aria-label="Previous input" role="button">▲</div>
      <div class="key control" data-area="down" data-action="next" aria-label="Next input" role="button">▼</div>
      <div class="key control" data-area="paste" data-action="paste" role="button">Paste</div>
      <div class="key control" data-area="clear" data-action="clear" role="button">Clear</div>
      <div class="key control" data-area="left" data-action="left" aria-label="Move caret left" role="button">◀</div>
      <div class="key control" data-area="right" data-action="right" aria-label="Move caret right" role="button">▶</div>
      <div class="key control" data-area="back" data-action="back" aria-label="Backspace" role="button">⌫</div>
      <div class="key" data-area="n" data-key="N" data-coordinate role="button">N</div>
      <div class="key" data-area="s" data-key="S" data-coordinate role="button">S</div>
      <div class="key" data-area="w" data-key="W" data-coordinate role="button">W</div>
      <div class="key" data-area="e" data-key="E" data-coordinate role="button">E</div>
      <div class="key" data-area="one" data-key="1" role="button">1</div>
      <div class="key" data-area="two" data-key="2" role="button">2</div>
      <div class="key" data-area="three" data-key="3" role="button">3</div>
      <div class="key" data-area="four" data-key="4" role="button">4</div>
      <div class="key" data-area="five" data-key="5" role="button">5</div>
      <div class="key" data-area="six" data-key="6" role="button">6</div>
      <div class="key" data-area="seven" data-key="7" role="button">7</div>
      <div class="key" data-area="eight" data-key="8" role="button">8</div>
      <div class="key" data-area="nine" data-key="9" role="button">9</div>
      <div class="key" data-area="zero" data-key="0" role="button">0</div>
      <div class="key" data-area="plus" data-key="+" data-signed role="button">+</div>
      <div class="key" data-area="minus" data-key="-" data-signed role="button">−</div>
      <div class="key" data-area="degree" data-key="°" data-coordinate role="button">°</div>
      <div class="key" data-area="minute" data-key="'" data-coordinate role="button">'</div>
      <div class="key" data-area="second" data-key="&quot;" data-coordinate role="button">"</div>
      <div class="key" data-area="dot" data-key="." role="button">.</div>
      <div class="key" data-area="slash" data-key="/" data-coordinate role="button">/</div>
      <div class="key" data-area="space" data-key=" " data-coordinate role="button">space</div>
      <div class="key control" data-area="done" data-action="done" role="button">Done</div>
    </div>
  </aside>

  <script>
    let activeEditor = null;
    let caretIndex = 0;
    let pasteFeedbackTimer = null;
    let repeatTimer = null;
    const layouts = {
      ipad: {
        width: 1024, height: 420,
        keys: [
          ["up",10,10,150,65],["paste",10,210,150,65],["clear",10,110,150,65],["left",440,210,72,90],["right",520,210,72,90],["done",10,310,250,90],
          ["minus",280,235,65,66],["plus",355,235,65,66],["n",520,10,70,90],["s",440,10,72,90],["w",440,110,72,90],["e",520,110,72,90],
          ["degree",280,10,140,65],["one",610,10,90,90],["two",710,10,90,90],["three",810,10,90,90],["minute",280,85,140,65],
          ["four",610,110,90,90],["five",710,110,90,90],["six",810,110,90,90],["second",280,160,140,65],
          ["seven",610,210,90,90],["eight",710,210,90,90],["nine",810,210,90,90],["space",280,310,420,90],["zero",710,310,90,90],["dot",810,310,90,90],
          ["back",920,10,90,90],["slash",920,110,90,190],["down",920,310,90,90]
        ]
      },
      iphone: {
        width: 390, height: 360,
        keys: [
          ["up",10,10,60,60],["paste",90,270,60,40],["clear",90,10,60,45],["left",70,320,44,30],["right",125,320,44,30],["done",10,290,45,60],
          ["minus",90,220,60,40],["plus",90,170,60,40],["n",90,70,60,40],["s",10,80,60,22],["w",10,110,60,22],["e",90,120,60,40],
          ["degree",10,140,60,40],["one",180,10,60,60],["two",250,10,60,60],["three",320,10,60,60],["minute",10,190,60,40],
          ["four",180,80,60,60],["five",250,80,60,60],["six",320,80,60,60],["second",10,240,60,40],
          ["seven",180,150,60,60],["eight",250,150,60,60],["nine",320,150,60,60],["space",180,290,60,60],["zero",250,220,60,60],["dot",180,220,60,60],
          ["back",320,220,60,60],["slash",250,290,60,60],["down",320,290,60,60]
        ]
      }
    };

    function applyLayout() {
      const layout = layouts[window.innerWidth < 600 ? "iphone" : "ipad"];
      const keys = document.querySelector(".keys");
      const scale = Math.min(1, keys.parentElement.clientWidth / layout.width);
      keys.style.width = `${layout.width * scale}px`;
      keys.style.height = `${layout.height * scale}px`;
      layout.keys.forEach(([area, x, y, width, height]) => {
        const key = keys.querySelector(`[data-area="${area}"]`);
        Object.assign(key.style, {
          left: `${x * scale}px`, top: `${y * scale}px`,
          width: `${width * scale}px`, height: `${height * scale}px`
        });
      });
      keys.querySelector('[data-area="clear"]').textContent = layout === layouts.iphone ? "C" : "Clear";
      syncKeyboardHeight();
    }

    function keepActiveEditorVisible(behavior = "smooth") {
      if (!activeEditor || !document.body.classList.contains("keyboard-open")) return;
      requestAnimationFrame(() => {
        const viewportTop = window.visualViewport?.offsetTop || 0;
        const viewportHeight = window.visualViewport?.height || window.innerHeight;
        const viewportBottom = viewportTop + viewportHeight;
        const keyboardRect = document.querySelector(".keyboard").getBoundingClientRect();
        const keyboardTop = Math.min(keyboardRect.top, viewportBottom);
        const editorRect = activeEditor.getBoundingClientRect();
        const field = activeEditor.closest("label") || activeEditor;
        const fieldRect = field.getBoundingClientRect();
        const section = field.closest("section");
        const note = section?.querySelector(".note");
        const noteRect = note?.getBoundingClientRect();
        const visibleTop = Math.min(fieldRect.top, editorRect.top);
        const visibleBottom = Math.max(fieldRect.bottom, noteRect?.bottom || fieldRect.bottom);
        const margin = 24;
        let delta = 0;
        if (visibleBottom > keyboardTop - margin) {
          delta = visibleBottom - (keyboardTop - margin);
        } else if (visibleTop < viewportTop + margin) {
          delta = visibleTop - (viewportTop + margin);
        }
        if (Math.abs(delta) > 1) window.scrollBy({ top: delta, behavior });
      });
    }

    function editorValue(editor) {
      return editor?.dataset.value || "";
    }

    function setEditorValue(value, nextCaret = value.length) {
      if (!activeEditor) return;
      activeEditor.dataset.value = value;
      caretIndex = Math.max(0, Math.min(nextCaret, value.length));
      renderEditor(activeEditor);
    }

    function renderEditor(editor) {
      const value = editorValue(editor);
      editor.classList.toggle("empty", value.length === 0);
      if (editor !== activeEditor) {
        editor.textContent = value;
        return;
      }
      editor.replaceChildren(
        document.createTextNode(value.slice(0, caretIndex)),
        Object.assign(document.createElement("span"), { className: "caret" }),
        document.createTextNode(value.slice(caretIndex))
      );
    }

    function renderAllEditors() {
      document.querySelectorAll(".editor").forEach(renderEditor);
    }

    function syncKeyboardHeight() {
      const keyboard = document.querySelector(".keyboard");
      document.documentElement.style.setProperty("--keyboard-height", `${keyboard.offsetHeight}px`);
    }

    function updateKeyboard() {
      const coordinateMode = activeEditor?.dataset.mode === "coordinate";
      document.querySelectorAll("[data-coordinate]").forEach(key => {
        key.dataset.disabled = coordinateMode ? "" : "true";
        key.classList.toggle("disabled", !coordinateMode);
      });
      document.querySelectorAll("[data-signed]").forEach(key => {
        const enabled = activeEditor?.dataset.mode === "signed";
        key.dataset.disabled = enabled ? "" : "true";
        key.classList.toggle("disabled", !enabled);
      });
      const editors = [...document.querySelectorAll(".editor")];
      const index = editors.indexOf(activeEditor);
      setKeyDisabled("[data-action='previous']", index <= 0);
      setKeyDisabled("[data-action='next']", index < 0 || index >= editors.length - 1);
    }

    function setKeyDisabled(selector, disabled) {
      const key = document.querySelector(selector);
      key.dataset.disabled = disabled ? "true" : "";
      key.classList.toggle("disabled", disabled);
    }

    function moveToEditor(offset) {
      const editors = [...document.querySelectorAll(".editor")];
      const next = editors[editors.indexOf(activeEditor) + offset];
      if (next) openKeyboard(next);
    }

    function openKeyboard(editor) {
      if (activeEditor && activeEditor !== editor) {
        const previousEditor = activeEditor;
        activeEditor = null;
        previousEditor.classList.remove("active");
        renderEditor(previousEditor);
      }
      activeEditor = editor;
      caretIndex = editorValue(editor).length;
      editor.classList.add("active");
      document.body.classList.add("keyboard-open");
      renderEditor(editor);
      updateKeyboard();
      applyLayout();
      setTimeout(() => keepActiveEditorVisible(), 40);
    }

    function closeKeyboard() {
      if (activeEditor) {
        activeEditor.classList.remove("active");
        renderEditor(activeEditor);
      }
      activeEditor = null;
      document.body.classList.remove("keyboard-open");
      renderAllEditors();
    }

    function showPasteFeedback(success) {
      const paste = document.querySelector('[data-action="paste"]');
      clearTimeout(pasteFeedbackTimer);
      paste.classList.remove("paste-success", "paste-failure");
      paste.classList.add(success ? "paste-success" : "paste-failure");
      pasteFeedbackTimer = setTimeout(() => paste.classList.remove("paste-success", "paste-failure"), 450);
    }

    function insertText(text) {
      const value = editorValue(activeEditor);
      setEditorValue(value.slice(0, caretIndex) + text + value.slice(caretIndex), caretIndex + text.length);
    }

    function backspace() {
      if (!activeEditor || caretIndex === 0) return;
      const value = editorValue(activeEditor);
      setEditorValue(value.slice(0, caretIndex - 1) + value.slice(caretIndex), caretIndex - 1);
    }

    async function performAction(key) {
      if (!activeEditor || key.dataset.disabled === "true") return;
      if (key.dataset.key !== undefined) {
        insertText(key.dataset.key);
        return;
      }
      switch (key.dataset.action) {
        case "back": backspace(); break;
        case "left": caretIndex = Math.max(0, caretIndex - 1); renderEditor(activeEditor); break;
        case "right": caretIndex = Math.min(editorValue(activeEditor).length, caretIndex + 1); renderEditor(activeEditor); break;
        case "clear": setEditorValue("", 0); break;
        case "previous": moveToEditor(-1); break;
        case "next": moveToEditor(1); break;
        case "done": closeKeyboard(); break;
        case "paste":
          try {
            const text = await navigator.clipboard.readText();
            if (!text) throw new Error();
            insertText(text);
            showPasteFeedback(true);
          } catch {
            showPasteFeedback(false);
          }
          break;
      }
    }

    document.querySelectorAll(".editor").forEach(editor => {
      renderEditor(editor);
      editor.addEventListener("pointerdown", event => {
        event.preventDefault();
        openKeyboard(editor);
      });
    });

    document.querySelector(".keyboard").addEventListener("pointerdown", event => {
      event.preventDefault();
      event.stopPropagation();
      const key = event.target.closest(".key");
      if (!key) return;
      performAction(key);
      if (key.dataset.action === "back") {
        clearTimeout(repeatTimer);
        repeatTimer = setTimeout(() => {
          repeatTimer = setInterval(backspace, 70);
        }, 420);
      }
    });

    function stopRepeat() {
      clearTimeout(repeatTimer);
      clearInterval(repeatTimer);
      repeatTimer = null;
    }
    document.querySelector(".keyboard").addEventListener("pointerup", stopRepeat);
    document.querySelector(".keyboard").addEventListener("pointercancel", stopRepeat);
    document.querySelector(".keyboard").addEventListener("touchstart", event => event.preventDefault(), { passive: false });
    document.querySelector(".keyboard").addEventListener("touchmove", event => event.preventDefault(), { passive: false });
    document.addEventListener("contextmenu", event => {
      if (event.target.closest(".keyboard, .editor")) event.preventDefault();
    });
    window.addEventListener("resize", () => { applyLayout(); keepActiveEditorVisible("auto"); });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => { applyLayout(); keepActiveEditorVisible("auto"); });
      window.visualViewport.addEventListener("scroll", () => keepActiveEditorVisible("auto"));
    }
    applyLayout();
  </script>
</body>
</html>
